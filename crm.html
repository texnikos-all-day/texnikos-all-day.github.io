<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC CRM - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-xl animate-pulse">Φόρτωση συστήματος CRM...</p>
        </div>
    </div>

    <script>
        // ΦΩΤΙΑ: Εδώ βάζεις τα δικά σου στοιχεία από το Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID"
        };
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        let user = null;

        // Render functions
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex items-center justify-center">
                    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 border-t-4 border-blue-600">
                        <h1 class="text-2xl font-black mb-6 text-center text-slate-800 italic uppercase">HVAC CRM LOGIN</h1>
                        <input id="email" class="w-full p-3 border rounded mb-3" placeholder="Email" />
                        <input id="pass" type="password" class="w-full p-3 border rounded mb-4" placeholder="Κωδικός" />
                        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg">Είσοδος</button>
                    </div>
                </div>
            `;
        }

        async function renderDashboard() {
            // Δείγμα Leads (στην πραγματικότητα θα έρχονται από την db)
            document.getElementById('app').innerHTML = `
                <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-xl">
                    <b class="tracking-tighter italic">ADMIN PANEL: TEXNIKOS ALL DAY</b>
                    <button onclick="logout()" class="bg-red-600 px-4 py-1 rounded text-xs font-bold uppercase">Logout</button>
                </nav>

                <div class="p-6 max-w-6xl mx-auto">
                    <div class="grid md:grid-cols-3 gap-6 mb-10">
                        <div class="bg-white p-6 rounded-xl shadow-md border-b-4 border-green-500">
                            <h3 class="text-slate-500 text-sm font-bold uppercase">Ενεργά Leads</h3>
                            <p class="text-3xl font-black">24</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-md border-b-4 border-blue-500">
                            <h3 class="text-slate-500 text-sm font-bold uppercase">Χρήστης</h3>
                            <p class="text-lg font-bold truncate">${user.email}</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-md border-b-4 border-purple-500">
                            <h3 class="text-slate-500 text-sm font-bold uppercase">Συνδρομή</h3>
                            <p class="text-lg font-bold text-purple-600">LIVE PRO</p>
                        </div>
                    </div>

                    <div class="grid lg:grid-cols-2 gap-8">
                        <div class="bg-white p-6 rounded-2xl shadow-lg">
                            <h2 class="font-black mb-4 uppercase italic text-blue-900">Νέο Lead / Πελάτης</h2>
                            <input id="n" placeholder="Όνομα Πελάτη" class="p-3 border w-full mb-3 rounded" />
                            <input id="p" placeholder="Τηλέφωνο / Περιοχή" class="p-3 border w-full mb-4 rounded" />
                            <button onclick="saveLead()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold w-full shadow-lg transition">Αποθήκευση</button>
                        </div>

                        <div class="bg-slate-800 p-6 rounded-2xl shadow-lg text-white">
                            <h2 class="font-black mb-4 uppercase italic text-blue-400">Πακέτα Συντήρησης (Stripe)</h2>
                            <div class="space-y-3">
                                <button onclick="subscribe('starter')" class="w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-lg flex justify-between font-bold border border-slate-600">
                                    <span>Starter Plan</span> <span>€19/mo</span>
                                </button>
                                <button onclick="subscribe('pro')" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg flex justify-between font-bold shadow-lg">
                                    <span>Business Plan</span> <span>€49/mo</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Logic Functions
        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                alert("Σφάλμα σύνδεσης: " + e.message);
            }
        }

        async function logout() { await auth.signOut(); }

        async function saveLead() {
            alert("Το lead αποθηκεύτηκε! (Χρειάζεται σύνδεση Firebase για πραγματική εγγραφή)");
        }

        async function subscribe(plan) {
            alert("Ανακατεύθυνση στο Stripe για το πακέτο: " + plan);
        }

        // Auth Observer
        auth.onAuthStateChanged(u => {
            user = u;
            if(!user) { renderLogin(); } 
            else { renderDashboard(); }
        });

    </script>
</body>
</html>
