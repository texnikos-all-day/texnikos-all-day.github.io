<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC CRM | Nick's Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100">

<div id="app">
    <div class="flex items-center justify-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>
</div>

<script>
// ΟΙ ΔΙΚΟΙ ΣΟΥ ΚΩΔΙΚΟΙ
const firebaseConfig = {
  apiKey: "AIzaSyAz8R9vCh5cVySsHc0rLZd8Q40UEkP9xTY",
  authDomain: "hvac-crm-ccdfc.firebaseapp.com",
  projectId: "hvac-crm-ccdfc",
  storageBucket: "hvac-crm-ccdfc.firebasestorage.app",
  messagingSenderId: "992421441730",
  appId: "1:992421441730:web:2a01ad56f0fc41b574cb5b"
};

// Αρχικοποίηση
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 1. ΦΟΡΜΑ LOGIN
function renderLogin() {
    document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center px-4">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-700">
                <h1 class="text-2xl font-black mb-2 text-slate-800 uppercase italic">HVAC CRM</h1>
                <p class="text-slate-500 text-sm mb-6 uppercase tracking-widest">Nick's Industrial Lead System</p>
                <input id="email" class="w-full p-4 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Email" />
                <input id="pass" type="password" class="w-full p-4 border rounded-xl mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Κωδικός" />
                <button onclick="handleLogin()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">ΕΙΣΟΔΟΣ</button>
            </div>
        </div>
    `;
}

// 2. DASHBOARD
async function renderDashboard(user) {
    document.getElementById('app').innerHTML = `
        <nav class="bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-50">
            <b class="italic tracking-tighter uppercase font-black text-blue-400">HVAC CRM v1.0</b>
            <button onclick="auth.signOut()" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold uppercase tracking-widest">Logout</button>
        </nav>

        <div class="max-w-4xl mx-auto p-4 md:p-8">
            <div class="bg-white p-6 rounded-2xl shadow-xl mb-8 border-l-8 border-green-500">
                <h2 class="text-xl font-black text-slate-800 mb-4 uppercase italic">Νέα Βλάβη / Πελάτης</h2>
                <div class="grid gap-4">
                    <input id="customer" class="p-4 border rounded-xl w-full bg-slate-50" placeholder="Όνομα Πελάτη" />
                    <input id="phone" class="p-4 border rounded-xl w-full bg-slate-50" placeholder="Τηλέφωνο & Τοποθεσία" />
                    <textarea id="issue" class="p-4 border rounded-xl w-full bg-slate-50" placeholder="Περιγραφή Βλάβης (π.χ. Chiller Alarm 402)"></textarea>
                    <button onclick="saveLead()" class="bg-green-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-green-700 transition-all uppercase italic tracking-widest">ΑΠΟΘΗΚΕΥΣΗ LEAD</button>
                </div>
            </div>

            <h2 class="text-2xl font-black text-slate-800 mb-4 uppercase italic tracking-tight">Λίστα Εργασιών</h2>
            <div id="leadsList" class="space-y-4">
                <p class="text-slate-400 italic">Φόρτωση πελατών...</p>
            </div>
        </div>
    `;
    loadLeads();
}

// ΛΟΓΙΚΗ
async function handleLogin() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('pass').value;
    try { await auth.signInWithEmailAndPassword(e, p); } catch (err) { alert("Λάθος στοιχεία!"); }
}

async function saveLead() {
    const name = document.getElementById('customer').value;
    const phone = document.getElementById('phone').value;
    const desc = document.getElementById('issue').value;

    if(!name || !phone) return alert("Βάλε όνομα και τηλέφωνο!");

    await db.collection("leads").add({
        name, phone, desc,
        status: "Εκκρεμεί",
        date: new Date().toLocaleString('el-GR')
    });

    document.getElementById('customer').value = "";
    document.getElementById('phone').value = "";
    document.getElementById('issue').value = "";
    loadLeads();
}

async function loadLeads() {
    const snap = await db.collection("leads").orderBy("date", "desc").get();
    const list = document.getElementById('leadsList');
    list.innerHTML = "";
    
    snap.forEach(doc => {
        const lead = doc.data();
        list.innerHTML += `
            <div class="bg-white p-5 rounded-xl shadow-md border-r-4 border-blue-500">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="font-black text-blue-900 uppercase">${lead.name}</h3>
                    <span class="text-[10px] bg-slate-100 p-1 rounded font-bold text-slate-500">${lead.date}</span>
                </div>
                <p class="text-slate-800 font-bold text-sm mb-1">📞 ${lead.phone}</p>
                <p class="text-slate-600 text-sm italic">${lead.desc}</p>
            </div>
        `;
    });
}

auth.onAuthStateChanged(user => {
    if (user) { renderDashboard(user); } 
    else { renderLogin(); }
});
</script>

</body>
</html>
